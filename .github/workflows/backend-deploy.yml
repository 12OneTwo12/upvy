name: Backend Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'upvy-backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:
    inputs:
      target_branch:
        description: '배포를 트리거할 브랜치 (예: dev, main)'
        required: true
        default: 'main'
        type: choice
        options:
          - dev
          - main

env:
  DOCKER_IMAGE_REPO: upvy/upvy-backend

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
      environment: ${{ steps.vars.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set computed environment variables
        id: vars
        run: |
          # 환경 결정 (main -> prod, 그 외 -> dev)
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]] || \
             [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.target_branch }}" == "main" ]]; then
            ENVIRONMENT="prod"
          else
            ENVIRONMENT="dev"
          fi

          IMAGE_TAG="${{ github.sha }}"

          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

          echo "Environment: $ENVIRONMENT"
          echo "Image Tag: $IMAGE_TAG"

      - name: Grant execute permission for gradlew
        run: chmod +x upvy-backend/gradlew

      - name: Build with Gradle
        working-directory: upvy-backend
        run: ./gradlew bootJar --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./upvy-backend
          file: ./upvy-backend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_REPO }}:${{ steps.vars.outputs.image_tag }}
            ${{ env.DOCKER_IMAGE_REPO }}:${{ steps.vars.outputs.environment }}-latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: needs.build-and-push.outputs.environment == 'prod'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/upvy/app
            docker compose pull upvy-backend
            docker compose up -d upvy-backend
            echo "Waiting for health check..."
            sleep 15
            curl -sf http://localhost:8080/actuator/health/liveness || exit 1
            echo "Deploy successful!"

